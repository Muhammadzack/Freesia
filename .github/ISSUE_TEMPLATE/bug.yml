# Kebijakan Keamanan / Security Policy

*Bahasa Indonesia di bawah · English below*

---

## Bahasa Indonesia

### Jangan laporkan kerentanan di issue publik

GitHub Issues di repo ini terbuka untuk siapa pun. Kerentanan yang dilaporkan di sana bisa
dibaca — dan dipakai — orang lain sebelum sempat kami tambal. Gunakan jalur privat di bawah.

### Cara melapor

Pilih salah satu:

1. **GitHub Private Vulnerability Reporting** (paling disarankan)
   → tab **Security** di repo ini → **Report a vulnerability**.
   Laporannya privat antara Anda dan saya.
2. **DM di X/Twitter:** [@0xzackbh](https://x.com/0xzackbh)

Sertakan bila memungkinkan: apa kerentanannya, cara mereproduksinya, dampak terburuk yang
Anda bayangkan, dan alamat kontrak atau URL yang terpengaruh. Laporan seadanya tetap
diterima — laporan tidak sempurna jauh lebih baik daripada tidak ada laporan.

### Janji saya

- **Balasan pertama dalam 72 jam.** Freesia dikerjakan satu orang, bukan tim
  yang berjaga 24 jam — kalau lewat dari itu, tegur saya di X.
- **Saya akan bilang jujur** apakah laporan Anda valid, dan kalau tidak, kenapa.
- **Setelah ditambal, kerentanannya akan diterbitkan** di
  [halaman insiden](https://app.freesiadex.xyz/insiden) — lengkap dengan apa akibatnya,
  dan kredit untuk Anda kalau Anda mau. Kami tidak menyembunyikan kerentanan yang sudah
  selesai; menyembunyikannya berarti membohongi pengguna berikutnya.
- **Tidak ada tuntutan hukum** terhadap Anda atas riset yang dilakukan dengan itikad baik
  sesuai kebijakan ini.

### Aturan main

Boleh:
- Menguji apa pun di **testnet** — token di sana tanpa nilai.
- Membaca, memanggil, dan memeriksa kontrak kami sepuasnya.
- Melaporkan kelemahan di antarmuka web (XSS, dependensi, header, dsb).

Jangan:
- Menyerang RPC atau infrastruktur pihak ketiga (Caldera, Vercel, DIA) — itu bukan milik
  kami, dan kebijakan ini tidak melindungi Anda di sana.
- Mengambil dana milik pengguna lain, meski hanya untuk membuktikan sesuatu. Di pool
  USDC/DAI ada LP milik alamat lain — jangan disentuh.
- Merusak layanan bagi pengguna lain (DoS, spam transaksi).
- Rekayasa sosial terhadap siapa pun.

### Cakupan

**Dalam cakupan:** kontrak Freesia di LitVM Testnet (daftar lengkap ada di
[/verify](https://app.freesiadex.xyz/verify)), aplikasi DEX (`app.freesiadex.xyz`),
landing page (`freesiadex.xyz`), dan repo ini.

**Di luar cakupan:** jaringan LitVM/Caldera, oracle DIA, wallet pihak ketiga, dan
kerentanan yang butuh akses fisik ke perangkat korban.

### Yang sudah kami ketahui

Beberapa hal sudah tercatat terbuka di
[halaman insiden](https://app.freesiadex.xyz/insiden) — periksa dulu sebelum melapor:

- Pool USDC/DAI (`0x79989f44…`) berjalan di kontrak generasi awal, kode sumbernya hilang,
  dan sebagian proteksi tidak dapat diverifikasi. **Ini insiden terbuka**, bukan temuan baru.
- Kontrak Freesia **belum diaudit pihak ketiga**. Itu bukan kerentanan; itu keadaan yang
  kami nyatakan terus terang.

### Belum ada hadiah uang

Freesia belum punya token dan belum punya dana. Jadi jujur saja: **belum ada bug bounty
berbayar**. Yang bisa saya berikan adalah kredit publik di halaman insiden, dan janji
bahwa laporan Anda ditangani serius serta diterbitkan setelah ditambal. Kalau nanti ada
dukungan ekosistem, program bounty adalah salah satu yang pertama akan didanai.

