## English

### Do not report vulnerabilities in public issues

GitHub Issues here are open to anyone. A vulnerability reported there can be read — and
used — by others before we can patch it. Please use a private channel below.

### How to report

1. **GitHub Private Vulnerability Reporting** (preferred)
   → **Security** tab in this repo → **Report a vulnerability**. Private between you and me.
2. **DM on X/Twitter:** [@0xzackbh](https://x.com/0xzackbh)

Include if you can: what the vulnerability is, how to reproduce it, the worst impact you
can imagine, and the affected contract address or URL. Rough reports are welcome — an
imperfect report beats no report by a wide margin.

### My promises

- **First response within 72 hours.** Freesia is one person, not a 24/7 team — if I'm
  slower than that, call me out on X.
- **I'll tell you honestly** whether your report is valid, and if not, why.
- **Once patched, the vulnerability gets published** on the
  [incident log](https://app.freesiadex.xyz/insiden) — including what it cost, and credit
  to you if you want it. We don't hide fixed vulnerabilities; hiding them means lying to
  the next user.
- **No legal action** against you for good-faith research under this policy.

### Rules

Allowed:
- Test anything on **testnet** — those tokens are worthless.
- Read, call, and inspect our contracts as much as you like.
- Report web app weaknesses (XSS, dependencies, headers, etc).

Not allowed:
- Attacking third-party RPC or infrastructure (Caldera, Vercel, DIA) — not ours, and this
  policy does not protect you there.
- Taking other users' funds, even to prove a point. The USDC/DAI pool holds LP belonging
  to another address — leave it alone.
- Degrading service for others (DoS, transaction spam).
- Social engineering of anyone.

### Scope

**In scope:** Freesia contracts on LitVM Testnet (full list at
[/verify](https://app.freesiadex.xyz/verify)), the DEX app (`app.freesiadex.xyz`), the
landing page (`freesiadex.xyz`), and this repo.

**Out of scope:** the LitVM/Caldera network, the DIA oracle, third-party wallets, and
anything requiring physical access to a victim's device.

### Already known

Some things are already logged openly on the
[incident log](https://app.freesiadex.xyz/insiden) — please check before reporting:

- The USDC/DAI pool (`0x79989f44…`) runs on early-generation code, its source is lost, and
  some protections can't be verified. **This is an open incident**, not a new finding.
- Freesia's contracts are **not third-party audited**. That isn't a vulnerability; it's a
  fact we state plainly.

### No cash rewards yet

Freesia has no token and no funds. So, plainly: **there is no paid bug bounty yet**. What
I can offer is public credit on the incident log, and a promise that your report is taken
seriously and published once patched. If ecosystem support arrives, a bounty program is
among the first things it will fund.
